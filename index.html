<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inline HTML CSS JS</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f6d365, #fda085);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      text-align: center;
      width: 320px;
    }

    h1 {
      margin-bottom: 10px;
      color: #333;
    }

    p {
      color: #666;
    }

    button {
      margin-top: 16px;
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      background: #ff7b54;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #ff5e2e;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello</h1>
    <p id="message">Click the button to change this text.</p>
    <button onclick="changeText()">Click Me</button>
  </div>

  <script>
    function changeText() {
      document.getElementById("message").textContent = "You clicked the button!";
    }
  </script>
</body>
</html>
